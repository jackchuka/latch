version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: latch
    main: .
    binary: latch
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jackchuka/latch/internal/version.Version={{.Version}}
      - -X github.com/jackchuka/latch/internal/version.Commit={{.Commit}}
      - -X github.com/jackchuka/latch/internal/version.BuildDate={{.Date}}
    hooks:
      post:
        - cmd: >-
            {{ if eq .Os "darwin" }}codesign -s - -i com.latch.cli -f {{ .Path }}{{ else }}true{{ end }}
          output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^style:"
      - "^refactor:"
