{{define "queue_rows"}}
{{- if not .}}
<tr><td colspan="6" class="empty">No items in the queue.</td></tr>
{{- else}}
{{- range .}}
<tr>
  <td class="mono"><a href="/queue/{{.ID}}" title="{{.ID}}">{{truncateID .ID}}</a></td>
  <td><a href="/tasks/{{.Task}}">{{.Task}}</a></td>
  <td><span class="badge badge-{{statusClass .Status}}">{{.Status}}</span></td>
  <td title="{{formatTime .Created}}">{{relativeTime .Created}}</td>
  <td>{{.PausedAtStep}}</td>
  <td>
    {{- if eq .Status "pending"}}
    <form method="POST" action="/queue/{{.ID}}/approve" style="display:inline;">
      <button class="btn btn-primary btn-sm" type="submit">Approve</button>
    </form>
    <form method="POST" action="/queue/{{.ID}}/reject" style="display:inline;">
      <button class="btn btn-danger btn-sm" type="button" onclick="showConfirm('Reject this item?', this.closest('form'))">Reject</button>
    </form>
    {{- else if eq .Status "failed"}}
    <form method="POST" action="/queue/{{.ID}}/rerun" style="display:inline;" title="Rerun from failed step">
      <button class="btn btn-outline btn-sm" type="submit">Rerun</button>
    </form>
    {{- end}}
  </td>
</tr>
{{- end}}
{{- end}}
{{end}}
